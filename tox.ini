[tox]
no_package = True
skip_missing_interpreters = True
env_list = format, lint, unit, integration
min_version = 4.0.0

[vars]
src_path = {tox_root}/src
tests_path = {tox_root}/tests
;lib_path = {tox_root}/lib/charms/operator_name_with_underscores
all_path = {[vars]src_path} {[vars]tests_path}

[testenv]
set_env =
    PYTHONPATH = {tox_root}/lib:{[vars]src_path}
    PY_COLORS = 1

[testenv:format]
deps =
    ruff
commands =
    ruff format {[vars]all_path}
    ruff check --fix {[vars]all_path}

[testenv:lint]
deps =
    codespell
    coverage[toml]
    jubilant
    ops[testing]
    pyright
    pytest
    ruff
commands =
    codespell {tox_root}
    ruff check {[vars]all_path}
    ruff format --check --diff {[vars]all_path}
    pyright {posargs}

[testenv:unit]
deps =
    coverage[toml]
    ops[testing]
    pytest
commands =
    coverage run --source={[vars]src_path} -m pytest \
        -v \
        -s \
        --tb native \
        {[vars]tests_path}/unit \
        {posargs}
    coverage report

[testenv:integration]
deps =
    jubilant
    pytest
commands =
    pytest -v -s {[vars]tests_path}/integration {posargs}
